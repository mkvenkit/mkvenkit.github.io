<svg viewBox="0 0 720 590" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,monospace">

  <defs>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrA" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d97706"/>
    </marker>
    <marker id="arrP" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="590" fill="#ffffff" rx="10"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="bold">Humble iCE (ver 0.4) - Block Diagram</text>
  <text x="360" y="50" text-anchor="middle" fill="#16a34a" font-size="11">Lattice iCE40UP5K FPGA · Raspberry Pi RP2040 programmer &amp; clock source</text>

  <!-- USB-C (J1) -->
  <rect x="90" y="70" width="120" height="36" rx="6" fill="#f8fafc" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="93" text-anchor="middle" fill="#2563eb" font-size="12" font-weight="bold">USB-C (J1)</text>
  <line x1="150" y1="106" x2="150" y2="138" stroke="#2563eb" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- RP2040 (U3) -->
  <rect x="60" y="140" width="170" height="120" rx="6" fill="#f8fafc" stroke="#16a34a" stroke-width="1.5"/>
  <text x="145" y="172" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="bold">RP2040</text>
  <text x="145" y="190" text-anchor="middle" fill="#64748b" font-size="11">(U3)</text>
  <text x="145" y="216" text-anchor="middle" fill="#64748b" font-size="10">USB programmer</text>
  <text x="145" y="232" text-anchor="middle" fill="#64748b" font-size="10">+ 12 MHz clock</text>

  <!-- iCE40UP5K (U5) -->
  <rect x="490" y="140" width="175" height="130" rx="6" fill="#f8fafc" stroke="#16a34a" stroke-width="1.5"/>
  <text x="577" y="176" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="bold">iCE40UP5K</text>
  <text x="577" y="194" text-anchor="middle" fill="#64748b" font-size="11">(U5) · FPGA</text>
  <text x="577" y="224" text-anchor="middle" fill="#64748b" font-size="10">core @ 1.2 V</text>
  <text x="577" y="240" text-anchor="middle" fill="#64748b" font-size="10">I/O @ 3.3 V</text>

  <!-- Signal arrows RP2040 -> iCE40 -->
  <text x="234" y="160" fill="#16a34a" font-size="9">SPI · GP3-6 (MOSI/MISO/SS/SCK)</text>
  <line x1="230" y1="166" x2="488" y2="166" stroke="#16a34a" stroke-width="2" marker-end="url(#arrG)"/>

  <text x="234" y="188" fill="#16a34a" font-size="9">GP14 ~CRESET · GP15 CDONE</text>
  <line x1="230" y1="194" x2="488" y2="194" stroke="#16a34a" stroke-width="2" marker-end="url(#arrG)"/>

  <text x="234" y="216" fill="#16a34a" font-size="9">GP21 -&gt; 12 MHz clock</text>
  <line x1="230" y1="222" x2="488" y2="222" stroke="#16a34a" stroke-width="2" marker-end="url(#arrG)"/>

  <text x="234" y="244" fill="#16a34a" font-size="9">GP12/13 -&gt; UART TX/RX</text>
  <line x1="230" y1="250" x2="488" y2="250" stroke="#16a34a" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- QSPI down to flash -->
  <line x1="145" y1="260" x2="145" y2="313" stroke="#d97706" stroke-width="2" marker-end="url(#arrA)"/>
  <text x="152" y="288" fill="#64748b" font-size="9">QSPI (internal)</text>

  <!-- Flash W25Q32 (U4) -->
  <rect x="55" y="315" width="360" height="94" rx="6" fill="#f8fafc" stroke="#d97706" stroke-width="1.5"/>
  <text x="235" y="340" text-anchor="middle" fill="#b45309" font-size="12" font-weight="bold">W25Q32 (U4) · 4 MB flash (shared)</text>
  <line x1="72" y1="352" x2="398" y2="352" stroke="#cbd5e1" stroke-width="1"/>
  <text x="72" y="372" fill="#1e293b" font-size="10">0x000000-0x1DFFFF</text>
  <text x="210" y="372" fill="#64748b" font-size="10">RP2040 firmware (1920 KB)</text>
  <text x="72" y="394" fill="#1e293b" font-size="10">0x1E0000-0x1FFFFF</text>
  <text x="210" y="394" fill="#64748b" font-size="10">FPGA bitstream (128 KB)</text>

  <!-- Divider -->
  <line x1="20" y1="432" x2="700" y2="432" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="24" y="454" fill="#7c3aed" font-size="12" font-weight="bold">POWER</text>

  <!-- Source: USB VBUS -->
  <rect x="30" y="462" width="150" height="42" rx="6" fill="#f8fafc" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="105" y="481" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="bold">USB VBUS (J1)</text>
  <text x="105" y="496" text-anchor="middle" fill="#64748b" font-size="9">5 V</text>

  <!-- Source: 5 V header -->
  <rect x="30" y="520" width="150" height="42" rx="6" fill="#f8fafc" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="105" y="539" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="bold">5 V IN (J2/J3)</text>
  <text x="105" y="554" text-anchor="middle" fill="#64748b" font-size="9">external supply</text>

  <!-- Sources merge onto the 5 V bus -->
  <polyline points="180,483 240,483 240,541 180,541" fill="none" stroke="#7c3aed" stroke-width="2"/>
  <line x1="240" y1="512" x2="278" y2="512" stroke="#7c3aed" stroke-width="2"/>
  <text x="246" y="506" fill="#64748b" font-size="9">5 V</text>

  <!-- Branch to two rails -->
  <polyline points="278,512 278,481 328,481" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrP)"/>
  <polyline points="278,512 278,543 328,543" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrP)"/>

  <!-- 3.3 V rail -->
  <rect x="330" y="461" width="170" height="42" rx="6" fill="#f8fafc" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="415" y="480" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="bold">3.3 V · NCP115 (U2)</text>
  <text x="415" y="495" text-anchor="middle" fill="#64748b" font-size="9">RP2040, I/O, flash, LEDs</text>

  <!-- 1.2 V rail -->
  <rect x="330" y="523" width="170" height="42" rx="6" fill="#f8fafc" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="415" y="542" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="bold">1.2 V · NCP114 (U1)</text>
  <text x="415" y="557" text-anchor="middle" fill="#64748b" font-size="9">iCE40 core</text>

  <!-- Rails out -->
  <line x1="500" y1="482" x2="548" y2="482" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrP)"/>
  <text x="556" y="479" fill="#64748b" font-size="10">board</text>
  <text x="556" y="491" fill="#64748b" font-size="10">3.3 V rail</text>

  <line x1="500" y1="544" x2="548" y2="544" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrP)"/>
  <text x="556" y="541" fill="#64748b" font-size="10">iCE40</text>
  <text x="556" y="553" fill="#64748b" font-size="10">core</text>

  <text class="electronut-credit" x="712" y="582" text-anchor="end" font-family="ui-monospace,SFMono-Regular,monospace" font-size="13" fill="#9ca3af" opacity="0.8">© Electronut Labs</text>
</svg>
