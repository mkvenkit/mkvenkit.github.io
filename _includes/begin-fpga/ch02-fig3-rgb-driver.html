<p class="svg-anim__caption"><strong>Figure 3.</strong> The <code>SB_RGBA_DRV</code> primitive sinks constant current from each cathode of the common-anode LED; the <code>RGBxPWM</code> inputs gate the sinks. Note the mapping — RGB0 is blue, RGB2 is red. Each colour fades in and out under PWM, then the design advances to the next, cycling through the seven-colour set.</p>
